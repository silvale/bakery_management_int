<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bakery Dev UI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;display:flex;height:100vh;overflow:hidden;background:#f5f5f5}
#sidebar{width:210px;background:#1e293b;color:#94a3b8;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
#sidebar h1{font-size:13px;font-weight:700;color:#f1f5f9;padding:16px 14px 8px;letter-spacing:.05em;text-transform:uppercase}
.nav-group{padding:4px 0;border-top:1px solid #334155}
.nav-label{font-size:10px;font-weight:700;color:#64748b;padding:8px 14px 3px;text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:block;padding:6px 14px 6px 20px;cursor:pointer;color:#94a3b8;border-left:3px solid transparent;transition:all .15s;font-size:13px}
.nav-item:hover{background:#334155;color:#e2e8f0}
.nav-item.active{background:#0f172a;color:#38bdf8;border-left-color:#38bdf8}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 24px;display:flex;align-items:center;gap:12px}
#topbar h2{font-size:15px;font-weight:600;color:#0f172a;flex:1}
#content{flex:1;overflow-y:auto;padding:20px 24px}
#toast{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{padding:10px 16px;border-radius:6px;font-size:13px;font-weight:500;min-width:200px;max-width:360px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .2s ease}
.toast-ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast-err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;text-align:left;padding:7px 10px;font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.b-ing{background:#fef3c7;color:#92400e}.b-semi{background:#ede9fe;color:#5b21b6}.b-prod{background:#dcfce7;color:#166534}
.b-draft{background:#f1f5f9;color:#475569}.b-pending{background:#fef9c3;color:#713f12}
.b-approved{background:#d1fae5;color:#065f46}.b-rejected{background:#fee2e2;color:#991b1b}
.b-free{background:#dbeafe;color:#1e40af}.b-batch{background:#fce7f3;color:#9d174d}
.b-purchase{background:#e0f2fe;color:#0369a1}.b-transfer{background:#f3e8ff;color:#7c3aed}
.b-finalized{background:#d1fae5;color:#065f46}.b-active{background:#d1fae5;color:#065f46}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-warn{background:#d97706;color:#fff}.btn-warn:hover{background:#b45309}
.btn-ghost{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}.btn-ghost:hover{background:#e2e8f0}
.btn-sm{padding:3px 9px;font-size:12px}.btn:disabled{opacity:.4;cursor:not-allowed}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:600;color:#475569}
.field input,.field select,.field textarea{border:1px solid #d1d5db;border-radius:6px;padding:6px 9px;font-size:13px;color:#111827;background:#fff;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field textarea{resize:vertical;min-height:56px}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filter-bar select,.filter-bar input{border:1px solid #d1d5db;border-radius:6px;padding:5px 9px;font-size:13px;background:#fff}
.action-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.divider{border:none;border-top:1px solid #f1f5f9;margin:14px 0}
.empty{text-align:center;padding:36px;color:#94a3b8;font-size:13px}
.tabs{display:flex;gap:0;border-bottom:2px solid #e2e8f0;margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:#2563eb;border-bottom-color:#2563eb}
.tab:hover{color:#374151}
.recipe-table{width:100%;border-collapse:collapse;margin-top:6px}
.recipe-table th{background:#f8fafc;padding:5px 7px;font-size:12px;font-weight:600;color:#475569;border:1px solid #e2e8f0}
.recipe-table td{padding:3px 5px;border:1px solid #e2e8f0}
.recipe-table select,.recipe-table input{width:100%;border:none;padding:4px 5px;font-size:13px;background:transparent;outline:none}
.recipe-table select:focus,.recipe-table input:focus{background:#eff6ff;border-radius:3px}
.rule-row{display:grid;grid-template-columns:110px 60px 100px 110px 90px 36px;gap:6px;align-items:center;margin-bottom:5px}
.rule-row input,.rule-row select{border:1px solid #d1d5db;border-radius:5px;padding:5px 7px;font-size:13px;width:100%}
.group-item-row{display:grid;grid-template-columns:1fr 110px 60px 32px;gap:6px;align-items:center;margin-bottom:5px}
.group-item-row select,.group-item-row input{border:1px solid #d1d5db;border-radius:5px;padding:5px 7px;font-size:13px;width:100%}
.detail-expand td{padding:0;background:#f8fafc}
.detail-inner{padding:14px 18px}
.stat-row{display:flex;gap:20px;flex-wrap:wrap}
.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 16px;min-width:130px}
.stat-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:22px;font-weight:700;color:#0f172a;margin-top:2px}
</style>
</head>
<body>
<nav id="sidebar">
  <h1>🥐 Bakery Dev</h1>
  <div class="nav-group">
    <div class="nav-label">Master Data</div>
    <div class="nav-item active" onclick="nav('items-list')">📋 Sản phẩm</div>
    <div class="nav-item" onclick="nav('item-form',{})">➕ Tạo sản phẩm</div>
    <div class="nav-item" onclick="nav('suppliers')">🏭 Nhà cung cấp</div>
    <div class="nav-item" onclick="nav('product-mapping')">🔗 Product Mapping</div>
    <div class="nav-item" onclick="nav('item-groups')">🏠 Item Groups</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Kế hoạch SX</div>
    <div class="nav-item" onclick="nav('prod-groups')">🔧 Prod Groups</div>
    <div class="nav-item" onclick="nav('threshold-rules')">📏 Threshold Rules</div>
    <div class="nav-item" onclick="nav('prod-plans')">📅 Kế hoạch ngày</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Sản xuất</div>
    <div class="nav-item" onclick="nav('prod-requests')">📝 Phiếu SX</div>
    <div class="nav-item" onclick="nav('prod-adjustments')">⚠️ Điều chỉnh SX</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Kho</div>
    <div class="nav-item" onclick="nav('stock-summary')">📦 Tồn kho</div>
    <div class="nav-item" onclick="nav('inventory-requests')">📋 Phiếu kho</div>
  </div>
  <div class="nav-group">
    <div class="nav-label">Báo cáo</div>
    <div class="nav-item" onclick="nav('daily-report')">📊 Báo cáo ngày</div>
    <div class="nav-item" onclick="nav('pos-sales')">🏪 POS Sales</div>
  </div>
</nav>

<div id="main">
  <div id="topbar"><h2 id="page-title">Danh sách sản phẩm</h2></div>
  <div id="content"></div>
</div>
<div id="toast"></div>

<script>
const BASE='http://localhost:8080';
let allItems=[],allWarehouses=[],allSuppliers=[];
let itemsPage=0; const PAGE_SIZE=20;

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method,path,body){
  try{
    const res=await fetch(BASE+path,{method,headers:{'Content-Type':'application/json'},body:body!=null?JSON.stringify(body):undefined});
    if(!res.ok){const t=await res.text();throw new Error(t||res.statusText)}
    if(res.status===204)return null;
    return res.json();
  }catch(e){toast(e.message,'err');throw e}
}
async function apiForm(path,formData){
  try{
    const res=await fetch(BASE+path,{method:'POST',body:formData});
    if(!res.ok){const t=await res.text();throw new Error(t||res.statusText)}
    return res.json();
  }catch(e){toast(e.message,'err');throw e}
}
async function loadAllItems(){
  try{const d=await api('GET','/api/v1/items?size=500');allItems=d?.content??d??[];}catch(_){allItems=[]}
}
async function loadAllWarehouses(){
  try{const d=await api('GET','/api/v1/warehouses/all');allWarehouses=d??[];}catch(_){allWarehouses=[]}
}
async function loadAllSuppliers(){
  try{const d=await api('GET','/api/v1/suppliers/all');allSuppliers=d??[];}catch(_){allSuppliers=[]}
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast-item toast-${type}`;
  el.textContent=typeof msg==='string'?msg:JSON.stringify(msg);
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ── Nav ───────────────────────────────────────────────────────────────────────
const PAGE_TITLES={'items-list':'Danh sách sản phẩm','item-form':'Tạo / Sửa sản phẩm',
  'suppliers':'Nhà cung cấp','product-mapping':'Product Mapping','item-groups':'Item Groups',
  'prod-groups':'Production Groups','threshold-rules':'Threshold Rules','prod-plans':'Kế hoạch sản xuất',
  'prod-requests':'Phiếu sản xuất','prod-adjustments':'Điều chỉnh SX',
  'stock-summary':'Tồn kho','inventory-requests':'Phiếu kho',
  'daily-report':'Báo cáo ngày','pos-sales':'POS Sales'};
const PAGE_FNS={'items-list':pageItemsList,'item-form':pageItemForm,'suppliers':pageSuppliers,
  'product-mapping':pageProductMapping,'item-groups':pageItemGroups,'prod-groups':pageProdGroups,
  'threshold-rules':pageThresholdRules,'prod-plans':pageProdPlans,'prod-requests':pageProdRequests,
  'prod-adjustments':pageProdAdjustments,'stock-summary':pageStockSummary,
  'inventory-requests':pageInventoryRequests,'daily-report':pageDailyReport,'pos-sales':pagePosSales};

function nav(page,data){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>{
    if(el.getAttribute('onclick')?.includes(`'${page}'`))el.classList.add('active');
  });
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  PAGE_FNS[page]?.(data);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function badge(val){
  const map={INGREDIENT:'b-ing NL',SEMI_PRODUCT:'b-semi BTP',PRODUCT:'b-prod SP',
    DRAFT:'b-draft Draft',PENDING_APPROVAL:'b-pending Pending',APPROVED:'b-approved Approved',
    REJECTED:'b-rejected Rejected',FREE_GROUP:'b-free Free',BATCH_FORMULA:'b-batch Batch',
    FINALIZED:'b-finalized Finalized',ACTIVE:'b-active Active',
    PURCHASE:'b-purchase Nhập',TRANSFER:'b-transfer Điều chuyển',ADJUSTMENT:'b-pending Điều chỉnh',
    PENDING:'b-pending Pending',READY:'b-approved Ready',COMPLETED:'b-finalized Done'};
  if(map[val]){const[cls,label]=map[val].split(' ');return`<span class="badge ${cls}">${label}</span>`}
  return val?`<span class="badge b-draft">${val}</span>`:'—';
}
function fmt(n){return n!=null?Number(n).toLocaleString('vi'):'—'}
function fmtDate(s){return s?new Date(s).toLocaleDateString('vi'):'—'}
function itemOpts(filter){
  return allItems.filter(filter||(()=>true))
    .map(i=>`<option value="${i.id}">[${i.itemType?.[0]}] ${i.code} — ${i.name}</option>`).join('');
}
function whOpts(){return allWarehouses.map(w=>`<option value="${w.id}">${w.code} — ${w.name}</option>`).join('')}
function supOpts(){return allSuppliers.map(s=>`<option value="${s.id}">${s.code} — ${s.name}</option>`).join('')}

// ══════════════════════════════════════════════════════════════════════════════
// ITEMS
// ══════════════════════════════════════════════════════════════════════════════
async function pageItemsList(){
  itemsPage=0;
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="filter-bar">
      <select id="ft" onchange="itemsPage=0;loadItems()">
        <option value="">Tất cả loại</option>
        <option value="INGREDIENT">Nguyên liệu</option>
        <option value="SEMI_PRODUCT">Bán thành phẩm</option>
        <option value="PRODUCT">Sản phẩm</option>
      </select>
      <input id="fn" placeholder="Tìm tên / code..." oninput="itemsPage=0;loadItems()" style="width:200px">
      <button class="btn btn-primary" onclick="nav('item-form',{})">+ Tạo mới</button>
    </div>
    <div id="items-wrap"><div class="empty">Đang tải...</div></div>
    <div id="items-pag" style="display:flex;align-items:center;gap:10px;justify-content:flex-end;margin-top:10px"></div>
  </div>`;
  await loadAllItems(); loadItems();
}
async function loadItems(){
  const type=document.getElementById('ft')?.value||'';
  const name=document.getElementById('fn')?.value||'';
  let path=`/api/v1/items?size=${PAGE_SIZE}&page=${itemsPage}`;
  if(type)path+=`&itemType=${type}`;
  if(name)path+=`&name=${encodeURIComponent(name)}`;
  const data=await api('GET',path);
  const items=data?.content??[];
  const total=data?.totalElements??0, totalPages=data?.totalPages??1;
  const wrap=document.getElementById('items-wrap'),pag=document.getElementById('items-pag');
  if(!wrap)return;
  if(!items.length){wrap.innerHTML='<div class="empty">Không có dữ liệu</div>';if(pag)pag.innerHTML='';return;}
  wrap.innerHTML=`<table><thead><tr>
    <th>Loại</th><th>Code</th><th>Tên</th><th>Đơn vị</th><th>Giá bán</th><th>Status</th><th></th>
  </tr></thead><tbody>
  ${items.map(i=>`<tr>
    <td>${badge(i.itemType)}</td><td><code>${i.code}</code></td><td>${i.name}</td><td>${i.unit}</td>
    <td>${i.sellingPrice!=null?fmt(i.sellingPrice)+'đ':'—'}</td>
    <td>${badge(i.approvalStatus)}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-ghost btn-sm" onclick='nav("item-form",${JSON.stringify(i)})'>Sửa</button>
      ${i.approvalStatus==='DRAFT'||i.approvalStatus==='PENDING_APPROVAL'
        ?`<button class="btn btn-success btn-sm" onclick="approveItem('${i.id}')">Approve</button>`:''}
    </td>
  </tr>`).join('')}</tbody></table>`;
  if(pag){
    const from=itemsPage*PAGE_SIZE+1,to=Math.min((itemsPage+1)*PAGE_SIZE,total);
    pag.innerHTML=`<span style="font-size:12px;color:#64748b">${from}–${to} / ${total}</span>
      <button class="btn btn-ghost btn-sm" onclick="itemsPage--;loadItems()" ${itemsPage===0?'disabled':''}>‹</button>
      <span style="font-size:13px">Trang ${itemsPage+1}/${totalPages}</span>
      <button class="btn btn-ghost btn-sm" onclick="itemsPage++;loadItems()" ${itemsPage>=totalPages-1?'disabled':''}>›</button>`;
  }
}
async function approveItem(id){await api('POST',`/api/v1/items/${id}/approve`);toast('Đã approve');loadItems();}

// Item Form
let recipeLines=[];
async function pageItemForm(item={}){
  await loadAllItems();
  const isEdit=!!item.id;
  recipeLines=(item.recipe?.lines??[]).map(l=>({itemId:l.item?.id??'',qty:l.quantity??'',unit:l.unit??'',sort:l.sortOrder??1}));
  let groups=[];try{groups=await api('GET','/api/v1/item-groups');}catch(_){}
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div class="card-title">${isEdit?'Sửa: '+item.name:'Tạo sản phẩm mới'}</div>
    <div class="form-grid">
      <div class="field"><label>Loại *</label>
        <select id="f-type" onchange="onItemTypeChange()" ${isEdit?'disabled':''}>
          <option value="">-- Chọn --</option>
          <option value="INGREDIENT" ${item.itemType==='INGREDIENT'?'selected':''}>Nguyên liệu</option>
          <option value="SEMI_PRODUCT" ${item.itemType==='SEMI_PRODUCT'?'selected':''}>Bán thành phẩm</option>
          <option value="PRODUCT" ${item.itemType==='PRODUCT'?'selected':''}>Sản phẩm</option>
        </select></div>
      <div class="field"><label>Item Group</label>
        <select id="f-ig">
          <option value="">-- Không có --</option>
          ${groups.map(g=>`<option value="${g.id}" ${item.itemGroup?.key===g.code?'selected':''}>${g.code} — ${g.name}</option>`).join('')}
        </select></div>
      <div class="field"><label>Code *</label><input id="f-code" value="${item.code??''}"></div>
      <div class="field"><label>Tên *</label><input id="f-name" value="${item.name??''}"></div>
      <div class="field"><label>Đơn vị *</label><input id="f-unit" value="${item.unit??''}" placeholder="cái, kg..."></div>
      <div class="field" id="f-price-wrap" style="${item.itemType==='PRODUCT'?'':'display:none'}">
        <label>Giá bán</label><input id="f-price" type="number" value="${item.sellingPrice??''}"></div>
      <div class="field" id="f-ingtype-wrap" style="${item.itemType==='INGREDIENT'?'':'display:none'}">
        <label>Ingredient Type</label><input id="f-ingtype" value="${item.ingredientType??''}" placeholder="DRY, WET..."></div>
    </div>
    <div id="recipe-section" style="${item.itemType==='PRODUCT'||item.itemType==='SEMI_PRODUCT'?'':'display:none'}">
      <hr class="divider">
      <div class="card-title">Công thức</div>
      <div class="field" style="margin-bottom:8px"><label>Ghi chú công thức</label>
        <textarea id="f-rnote">${item.recipe?.note??''}</textarea></div>
      <table class="recipe-table"><thead><tr>
        <th style="width:45%">Nguyên liệu / BTP</th><th style="width:20%">Số lượng</th>
        <th style="width:20%">Đơn vị</th><th style="width:10%">Sort</th><th></th>
      </tr></thead><tbody id="recipe-tbody"></tbody></table>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px" onclick="addRL()">+ Thêm dòng</button>
    </div>
    <div class="action-row">
      <button class="btn btn-ghost" onclick="nav('items-list')">Huỷ</button>
      <button class="btn btn-primary" onclick="saveItem('${item.id??''}')">
        ${isEdit?'Lưu thay đổi':'Tạo sản phẩm'}</button>
    </div>
  </div>`;
  renderRL();
}
function onItemTypeChange(){
  const t=document.getElementById('f-type').value;
  document.getElementById('f-price-wrap').style.display=t==='PRODUCT'?'':'none';
  document.getElementById('f-ingtype-wrap').style.display=t==='INGREDIENT'?'':'none';
  document.getElementById('recipe-section').style.display=(t==='PRODUCT'||t==='SEMI_PRODUCT')?'':'none';
}
function renderRL(){
  const tb=document.getElementById('recipe-tbody');if(!tb)return;
  tb.innerHTML=recipeLines.map((l,i)=>`<tr>
    <td><select onchange="recipeLines[${i}].itemId=this.value">
      <option value="">-- Chọn --</option>
      ${allItems.filter(x=>x.itemType!=='PRODUCT').map(x=>`<option value="${x.id}" ${x.id===l.itemId?'selected':''}>[${x.itemType?.[0]}] ${x.code} — ${x.name}</option>`).join('')}
    </select></td>
    <td><input type="number" step="0.001" value="${l.qty}" onchange="recipeLines[${i}].qty=+this.value"></td>
    <td><input value="${l.unit}" onchange="recipeLines[${i}].unit=this.value" placeholder="kg,g..."></td>
    <td><input type="number" value="${l.sort||i+1}" onchange="recipeLines[${i}].sort=+this.value" style="width:50px"></td>
    <td><button class="btn btn-danger btn-sm" onclick="recipeLines.splice(${i},1);renderRL()">✕</button></td>
  </tr>`).join('');
}
function addRL(){recipeLines.push({itemId:'',qty:'',unit:'',sort:recipeLines.length+1});renderRL();}
async function saveItem(id){
  const itemType=document.getElementById('f-type').value;
  if(!itemType){toast('Chọn loại sản phẩm','err');return;}
  const igVal=document.getElementById('f-ig').value;
  const body={itemType,code:document.getElementById('f-code').value.trim(),
    name:document.getElementById('f-name').value.trim(),unit:document.getElementById('f-unit').value.trim(),
    itemGroupId:igVal||null,
    ingredientType:document.getElementById('f-ingtype')?.value.trim()||null,
    sellingPrice:document.getElementById('f-price')?.value?+document.getElementById('f-price').value:null,
    recipeNote:document.getElementById('f-rnote')?.value||null,
    recipeLines:recipeLines.filter(l=>l.itemId).map(l=>({itemId:l.itemId,quantity:+l.qty,unit:l.unit,sortOrder:l.sort}))};

async function onTrGroup(groupId){
  const sg=document.getElementById('tr-single');if(sg){sg.value='';sg.disabled=!!groupId;}
  const group=trProdGroups.find(g=>g.id===groupId);
  const cont=document.getElementById('tr-editor');trRulesMap={};
  if(!group||!group.items?.length){cont.style.display='none';return;}
  cont.style.display='';cont.innerHTML='<div class="empty">Đang tải rules...</div>';
  const valid=group.items.filter(gi=>gi.itemId);
  await Promise.all(valid.map(async gi=>{
    try{const d=await api('GET',`/api/v1/items/${gi.itemId}/threshold-rules`);
      trRulesMap[gi.itemId]=(d??[]).map(r=>({...r}));}
    catch(_){trRulesMap[gi.itemId]=[];}
  }));
  renderTrAll({items:valid});
}
async function onTrSingle(itemId){
  const gg=document.getElementById('tr-group');if(gg){gg.value='';gg.disabled=!!itemId;}
  const cont=document.getElementById('tr-editor');trRulesMap={};
  if(!itemId){cont.style.display='none';return;}
  cont.style.display='';cont.innerHTML='<div class="empty">Đang tải...</div>';
  try{const d=await api('GET',`/api/v1/items/${itemId}/threshold-rules`);trRulesMap[itemId]=(d??[]).map(r=>({...r}));}
  catch(_){trRulesMap[itemId]=[];}
  const sel=document.getElementById('tr-single');
  const name=sel?.options[sel.selectedIndex]?.text??itemId;
  renderTrAll({items:[{itemId,item:{name},gramsPerUnit:null}]});
}
function renderTrAll(group){
  const cont=document.getElementById('tr-editor');
  const valid=group.items.filter(gi=>gi.itemId);
  if(!valid.length){cont.innerHTML='<div class="empty">Không có item hợp lệ</div>';return;}
  cont.innerHTML=valid.map(gi=>{
    const itemId=gi.itemId;
    const name=gi.item?.name??gi.item?.key??itemId;
    const extra=gi.gramsPerUnit?` — ${gi.gramsPerUnit}g/cái`:'';
    return`<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div><strong>${name}</strong><span style="color:#94a3b8;font-size:12px">${extra}</span></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="addTrRule('${itemId}')">+ Rule</button>
          <button class="btn btn-primary btn-sm" onclick="saveTrFor('${itemId}')">💾 Lưu</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:110px 60px 100px 110px 90px 36px;gap:6px;margin-bottom:4px;padding:0 2px">
        <small style="font-weight:600;color:#64748b">Day Type</small>
        <small style="font-weight:600;color:#64748b">Sort</small>
        <small style="font-weight:600;color:#64748b">Cond. Type</small>
        <small style="font-weight:600;color:#64748b">Cond. Value</small>
        <small style="font-weight:600;color:#64748b">Làm thêm</small><div></div>
      </div>
      <div id="tr-rows-${itemId}"></div>
    </div>`;
  }).join('');
  valid.forEach(gi=>renderTrRows(gi.itemId));
}
function renderTrRows(itemId){
  const el=document.getElementById(`tr-rows-${itemId}`);if(!el)return;
  const rules=trRulesMap[itemId]??[];
  if(!rules.length){el.innerHTML='<div style="color:#94a3b8;font-size:12px;padding:4px">Chưa có rule — bấm "+ Rule"</div>';return;}
  el.innerHTML=rules.map((r,i)=>`<div class="rule-row">
    <select onchange="trRulesMap['${itemId}'][${i}].dayType=this.value">
      <option value="WEEKDAY" ${r.dayType==='WEEKDAY'?'selected':''}>WEEKDAY</option>
      <option value="WEEKEND" ${r.dayType==='WEEKEND'?'selected':''}>WEEKEND</option>
    </select>
    <input type="number" value="${r.sortOrder??i+1}" onchange="trRulesMap['${itemId}'][${i}].sortOrder=+this.value">
    <select onchange="trRulesMap['${itemId}'][${i}].conditionType=this.value">
      <option value="COUNT" ${r.conditionType==='COUNT'?'selected':''}>COUNT</option>
      <option value="PERCENT" ${r.conditionType==='PERCENT'?'selected':''}>PERCENT</option>
    </select>
    <input type="number" step="0.01" value="${r.conditionValue??''}" onchange="trRulesMap['${itemId}'][${i}].conditionValue=+this.value" placeholder="12">
    <input type="number" value="${r.produceQty??''}" onchange="trRulesMap['${itemId}'][${i}].produceQty=+this.value" placeholder="24">
    <button class="btn btn-danger btn-sm" onclick="trRulesMap['${itemId}'].splice(${i},1);renderTrRows('${itemId}')">✕</button>
  </div>`).join('');
}
function addTrRule(itemId){
  if(!trRulesMap[itemId])trRulesMap[itemId]=[];
  trRulesMap[itemId].push({dayType:'WEEKDAY',sortOrder:trRulesMap[itemId].length+1,conditionType:'COUNT',conditionValue:'',produceQty:''});
  renderTrRows(itemId);
}
async function saveTrFor(itemId){
  const rules=(trRulesMap[itemId]??[]).map(r=>({dayType:r.dayType,sortOrder:r.sortOrder,conditionType:r.conditionType,conditionValue:r.conditionValue,produceQty:r.produceQty}));
  await api('PUT',`/api/v1/items/${itemId}/threshold-rules`,{rules});
  toast('Đã lưu rules');
}

async function loadPlanList(){

async function loadPlanByDate(date){

async function loadPlanById(id){

}
function renderPlan(plan){
  const cont=document.getElementById('plan-detail');if(!cont)return;
  const isDraft=plan.approvalStatus==='DRAFT';
  const lines=plan.lines??[];
  cont.innerHTML=`<div class="card">

      <div>

        ${isDraft?`<button class="btn btn-success" onclick="approvePlan('${plan.id}')">✅ Approve</button>
          <button class="btn btn-danger" onclick="rejectPlanPrompt('${plan.id}')">❌ Reject</button>`:''}
      </div>
    </div>
    <table><thead><tr>
      <th>Sản phẩm</th><th>Loại</th><th>Tồn</th><th>Gợi ý</th>

      <td>${l.item?.name??l.item?.key??'?'}</td>
      <td><span style="font-size:11px;color:#64748b">${l.planType}</span></td>
      <td>${fmt(l.qtyRemaining)}</td>
      <td><strong>${l.suggestedQty??'—'}</strong></td>
      <td>${isDraft?`<input type="number" style="width:70px;border:1px solid #d1d5db;border-radius:4px;padding:3px 6px;font-size:13px"
        value="${l.adjustedQty??''}" onchange="updatePlanLine('${plan.id}','${l.id}',this.value)" placeholder="—">`
        :(l.adjustedQty??l.suggestedQty??'—')}</td>
      <td style="font-size:12px;color:#64748b">${l.ruleNote??'—'}</td>
    </tr>`).join('')}</tbody></table>

async function updatePlanLine(planId,lineId,val){

  await api('PUT',`/api/v1/production/plans/${planId}/adjust`,{lines:[{lineId,adjustedQty:+val}]});
}
async function approvePlan(id){
  await api('POST',`/api/v1/production/plans/${id}/approve`);toast('Đã approve kế hoạch');loadPlanList();
  const plan=await api('GET',`/api/v1/production/plans/${id}`);renderPlan(plan);

async function rejectPlanPrompt(id){
  const reason=prompt('Lý do reject:');

  await api('POST',`/api/v1/production/plans/${id}/reject?reason=${encodeURIComponent(reason)}`);

}

async function completeLinePrompt(prId,lineId,planned){
  const qty=prompt(`Số lượng thực tế (kế hoạch: ${planned}):`);
  if(qty===null)return;
  const actual=+qty;
  let adjType=null,reason=null;
  if(actual!=planned){
    adjType=prompt('Loại điều chỉnh (INGREDIENT_VARIANCE / PRODUCTION_WASTAGE):','PRODUCTION_WASTAGE');
    if(!adjType)return;
    reason=prompt('Lý do:');
    if(!reason)return;
  }
  await api('POST',`/api/v1/production-requests/${prId}/lines/complete-batch`,
    {lines:[{lineId,qtyProduced:actual,adjustmentType:adjType,reason,note:null}]});
  toast('Đã ghi nhận hoàn thành');loadPRs();
}

      <div style="display:grid;grid-template-columns:1fr 80px 70px 90px 50px 32px;gap:5px;margin-bottom:4px">
        <small style="font-weight:600;color:#64748b">Nguyên liệu</small>
        <small style="font-weight:600;color:#64748b">Số lượng</small>
        <small style="font-weight:600;color:#64748b">Đơn vị</small>
        <small style="font-weight:600;color:#64748b" id="ir-cost-hdr">Đơn giá</small>
        <small style="font-weight:600;color:#64748b">Sort</small><div></div>
      </div>
      <div id="ir-lines"></div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px" onclick="addIRLine()">+ Thêm dòng</button>
      <div class="action-row"><button class="btn btn-primary" onclick="saveIR()">Tạo phiếu</button></div>
    </div>
  </div>`;
  irLines=[];renderIRLines();loadIRs();
}
function switchIRTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ir-list-tab').style.display=tab==='list'?'':'none';
  document.getElementById('ir-create-tab').style.display=tab==='create'?'':'none';
}
function onIRType(){
  const t=document.getElementById('ir-type').value;
  document.getElementById('ir-sup-wrap').style.display=t==='PURCHASE'?'':'none';
  document.getElementById('ir-src-wrap').style.display=t==='TRANSFER'?'':'none';
  document.getElementById('ir-cost-hdr').style.display=t==='PURCHASE'?'':'none';
  renderIRLines();
}
function renderIRLines(){
  const isPurchase=document.getElementById('ir-type')?.value==='PURCHASE';
  const el=document.getElementById('ir-lines');if(!el)return;
  el.innerHTML=irLines.map((l,i)=>`
    <div style="display:grid;grid-template-columns:1fr 80px 70px ${isPurchase?'90px':''} 50px 32px;gap:5px;margin-bottom:5px;align-items:center">
      <select onchange="irLines[${i}].itemId=this.value">
        <option value="">-- Chọn NL/SP --</option>${itemOpts()}
      </select>
      <input type="number" step="0.001" value="${l.qty??''}" onchange="irLines[${i}].qty=this.value" placeholder="Qty">
      <input value="${l.unit??''}" onchange="irLines[${i}].unit=this.value" placeholder="kg, cái...">
      ${isPurchase?`<input type="number" step="0.01" value="${l.cost??''}" onchange="irLines[${i}].cost=this.value" placeholder="Đơn giá">`:''}
      <input type="number" value="${l.sort||i+1}" onchange="irLines[${i}].sort=+this.value">
      <button class="btn btn-danger btn-sm" onclick="irLines.splice(${i},1);renderIRLines()">✕</button>
    </div>`).join('');
}
function addIRLine(){irLines.push({itemId:'',qty:'',unit:'',cost:'',sort:irLines.length+1});renderIRLines();}
async function saveIR(){
  const type=document.getElementById('ir-type').value;
  const lines=irLines.filter(l=>l.itemId).map(l=>({itemId:l.itemId,quantity:+l.qty,unit:l.unit,
    unitCost:l.cost?+l.cost:null,sortOrder:l.sort??0}));
  if(!lines.length){toast('Cần ít nhất 1 dòng','err');return;}
  const body={requestType:type,requestDate:document.getElementById('ir-date').value,
    supplierId:document.getElementById('ir-sup')?.value||null,
    sourceWarehouseId:document.getElementById('ir-src')?.value||null,
    targetWarehouseId:document.getElementById('ir-tgt').value||null,
    note:document.getElementById('ir-note').value||null,lines};
  if(!body.targetWarehouseId){toast('Chọn kho nhận','err');return;}
  await api('POST','/api/v1/inventory-requests',body);
  toast('Đã tạo phiếu kho');irLines=[];renderIRLines();loadIRs();
}
async function loadIRs(){
  const wh=document.getElementById('ir-wh')?.value||'';
  const status=document.getElementById('ir-status')?.value||'PENDING_APPROVAL';
  let path=wh?`/api/v1/inventory-requests/by-warehouse?warehouseCode=${wh}&approvalStatus=${status}`
    :`/api/v1/inventory-requests?size=50`;
  const data=await api('GET',path);
  const items=data?.content??data??[];
  const el=document.getElementById('ir-list');if(!el)return;
  if(!items.length){el.innerHTML='<div class="empty">Không có phiếu</div>';return;}
  el.innerHTML=`<table><thead><tr>
    <th>Code</th><th>Loại</th><th>Ngày</th><th>Kho xuất→nhận</th><th>NCC</th><th>Status</th><th></th>
  </tr></thead>
  <tbody>${items.map(r=>`
    <tr style="cursor:pointer" onclick="toggleIR('${r.id}')">
      <td><strong>${r.code??'—'}</strong></td>
      <td>${badge(r.requestType)}</td>
      <td>${r.requestDate??'—'}</td>
      <td>${r.sourceWarehouse?r.sourceWarehouse.key+' → ':''}<strong>${r.targetWarehouse?.key??'?'}</strong></td>
      <td>${r.supplier?.name??'—'}</td>
      <td>${badge(r.approvalStatus)}</td>
      <td style="white-space:nowrap" onclick="event.stopPropagation()">
        ${r.approvalStatus==='DRAFT'||r.approvalStatus==='PENDING_APPROVAL'
          ?`<button class="btn btn-success btn-sm" onclick="approveIR('${r.id}')">Approve</button>
             <button class="btn btn-danger btn-sm" onclick="rejectIRPrompt('${r.id}')">Reject</button>`:''}
      </td>
    </tr>
    <tr id="ird-${r.id}" class="detail-expand" style="display:none">
      <td colspan="7"><div class="detail-inner">${renderIRDetail(r)}</div></td>
    </tr>`).join('')}</tbody></table>`;
}
function renderIRDetail(r){
  const lines=r.lines??[];
  return lines.length?`<table style="width:100%;font-size:13px;border-collapse:collapse">
    <thead><tr>
      <th style="padding:4px 8px;background:#f1f5f9">Hàng hóa</th>
      <th style="padding:4px 8px;background:#f1f5f9;text-align:right">Số lượng</th>
      <th style="padding:4px 8px;background:#f1f5f9">Đơn vị</th>
      <th style="padding:4px 8px;background:#f1f5f9;text-align:right">Đơn giá</th>
    </tr></thead>
    <tbody>${lines.map(l=>`<tr>
      <td style="padding:4px 8px;border-bottom:1px solid #f1f5f9">${l.item?.name??l.item?.key??'?'}</td>
      <td style="padding:4px 8px;border-bottom:1px solid #f1f5f9;text-align:right">${fmt(l.quantity)}</td>
      <td style="padding:4px 8px;border-bottom:1px solid #f1f5f9">${l.unit??'—'}</td>
      <td style="padding:4px 8px;border-bottom:1px solid #f1f5f9;text-align:right">${l.unitCost?fmt(l.unitCost)+'đ':'—'}</td>
    </tr>`).join('')}</tbody>
  </table>`:'<div style="color:#94a3b8;font-size:12px">Không có dòng</div>';
}
function toggleIR(id){
  const row=document.getElementById(`ird-${id}`);if(!row)return;
  const open=row.style.display!=='none';
  document.querySelectorAll('[id^="ird-"]').forEach(r=>r.style.display='none');
  if(!open)row.style.display='';
}
async function approveIR(id){await api('POST',`/api/v1/inventory-requests/${id}/approve`);toast('Đã approve');loadIRs();}
async function rejectIRPrompt(id){
  const r=prompt('Lý do reject:');if(r===null)return;
  await api('POST',`/api/v1/inventory-requests/${id}/reject`,{rejectedReason:r});toast('Đã reject');loadIRs();
}

// ══════════════════════════════════════════════════════════════════════════════
// DAILY REPORT
// ══════════════════════════════════════════════════════════════════════════════
async function pageDailyReport(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('content').innerHTML=`
  <div class="card">
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div class="field"><label>Ngày báo cáo</label>
        <input type="date" id="dr-date" value="${today}"></div>
      <button class="btn btn-primary" onclick="initDR()">📋 Tải / Tạo báo cáo</button>
    </div>
  </div>
  <div id="dr-detail"></div>`;
}
async function initDR(){
  const date=document.getElementById('dr-date').value;
  if(!date){toast('Chọn ngày','err');return;}
  const report=await api('POST','/api/v1/daily-reports/init',{date});
  renderDR(report);
}
function renderDR(r){
  const cont=document.getElementById('dr-detail');if(!cont)return;
  const isDraft=r.status==='DRAFT';
  cont.innerHTML=`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <strong style="font-size:15px">Báo cáo ngày ${r.reportDate}</strong>
        <span style="margin-left:8px">${badge(r.status)}</span>
      </div>
      ${isDraft?`<button class="btn btn-success" onclick="finalizeDR('${r.id}')">✅ Finalize</button>`:''}
    </div>
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat"><div class="stat-label">Ngày</div><div class="stat-value">${r.reportDate}</div></div>
      <div class="stat"><div class="stat-label">Trạng thái</div><div class="stat-value" style="font-size:16px">${r.status}</div></div>
      ${r.finalizedBy?`<div class="stat"><div class="stat-label">Finalized by</div><div class="stat-value" style="font-size:14px">${r.finalizedBy}</div></div>`:''}
    </div>
    <div id="dr-lines-wrap"><div class="empty">Đang tải dòng...</div></div>
    ${isDraft?`<div style="margin-top:12px">
      <div class="card-title">Nhập tồn cuối ngày</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div class="field" style="min-width:200px"><label>Sản phẩm</label>
          <select id="dr-item">${itemOpts(x=>x.itemType==='PRODUCT')}</select></div>
        <div class="field"><label>Qty tồn</label><input type="number" id="dr-qty" step="0.5" placeholder="0"></div>
        <div class="field"><label>Ghi chú</label><input id="dr-note-line" placeholder="tùy chọn"></div>
        <button class="btn btn-primary" onclick="updateDRRemaining('${r.id}')">Cập nhật</button>
      </div>
    </div>`:''}
  </div>`;
  loadDRLines(r.id);
}
async function loadDRLines(reportId){
  const data=await api('GET',`/api/v1/daily-reports/${reportId}/lines`);
  const el=document.getElementById('dr-lines-wrap');if(!el)return;
  if(!data?.length){el.innerHTML='<div class="empty">Chưa có dòng báo cáo — hệ thống tự tổng hợp khi finalize</div>';return;}
  el.innerHTML=`<table><thead><tr>
    <th>Sản phẩm</th><th style="text-align:right">Sản xuất</th><th style="text-align:right">Nhận cửa hàng</th>
    <th style="text-align:right">Bán POS</th><th style="text-align:right">Tồn cuối</th>
    <th style="text-align:right">Bán thực</th><th style="text-align:right">Lệch kho</th>
  </tr></thead>
  <tbody>${data.map(l=>`<tr>
    <td>${l.item?.name??l.item?.key??'?'}</td>
    <td style="text-align:right">${fmt(l.qtyProduced)}</td>
    <td style="text-align:right">${fmt(l.qtyReceived)}</td>
    <td style="text-align:right">${fmt(l.qtySoldPos)}</td>
    <td style="text-align:right">${fmt(l.qtyRemainingActual)}</td>
    <td style="text-align:right">${fmt(l.qtySoldImplied)}</td>
    <td style="text-align:right;color:${Math.abs(l.discrepancyPos??0)>0?'#dc2626':'#374151'}">${fmt(l.discrepancyPos)}</td>
  </tr>`).join('')}</tbody></table>`;
}
async function updateDRRemaining(reportId){
  const itemId=document.getElementById('dr-item').value;
  const qty=document.getElementById('dr-qty').value;
  const note=document.getElementById('dr-note-line').value;
  if(!itemId){toast('Chọn sản phẩm','err');return;}
  await api('POST',`/api/v1/daily-reports/${reportId}/remaining`,{itemId,qtyRemainingActual:+qty,note:note||null});
  toast('Đã cập nhật');loadDRLines(reportId);
}
async function finalizeDR(id){
  if(!confirm('Finalize báo cáo này? Sẽ tự động tạo kế hoạch SX ngày mai.'))return;
  const r=await api('POST',`/api/v1/daily-reports/${id}/finalize`);
  toast('Đã finalize báo cáo!');renderDR(r);
}

// ══════════════════════════════════════════════════════════════════════════════
// POS SALES
// ══════════════════════════════════════════════════════════════════════════════
async function pagePosSales(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('content').innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 2fr;gap:14px;align-items:start">
    <div class="card">
      <div class="card-title">Upload file POS Excel</div>
      <div class="field" style="margin-bottom:10px"><label>File Excel (.xlsx)</label>
        <input type="file" id="pos-file" accept=".xlsx,.xls"></div>
      <div class="field" style="margin-bottom:10px"><label>Ngày bán</label>
        <input type="date" id="pos-date" value="${today}"></div>
      <button class="btn btn-primary" onclick="uploadPOS()">📤 Upload</button>
    </div>
    <div class="card">
      <div class="card-title">Doanh số POS đã nhập</div>
      <div class="filter-bar">
        <input type="date" id="pos-filter-date" value="${today}" onchange="loadPOS()">
        <button class="btn btn-ghost" onclick="loadPOS()">🔍 Tải</button>
      </div>
      <div id="pos-list"><div class="empty">Đang tải...</div></div>
    </div>
  </div>`;
  loadPOS();
}
async function uploadPOS(){
  const file=document.getElementById('pos-file').files[0];
  const date=document.getElementById('pos-date').value;
  if(!file){toast('Chọn file Excel','err');return;}
  if(!date){toast('Chọn ngày bán','err');return;}
  const fd=new FormData();fd.append('file',file);fd.append('saleDate',date);
  const result=await apiForm('/api/v1/pos-sales/upload',fd);
  toast(`Upload thành công: ${result?.imported??0} dòng`);loadPOS();
}
async function loadPOS(){
  const date=document.getElementById('pos-filter-date')?.value||new Date().toISOString().slice(0,10);
  const data=await api('GET',`/api/v1/pos-sales?saleDate=${date}`);
  const el=document.getElementById('pos-list');if(!el)return;
  if(!data?.length){el.innerHTML='<div class="empty">Không có dữ liệu POS cho ngày này</div>';return;}
  const total=data.reduce((s,r)=>s+(r.qtySold??0),0);
  el.innerHTML=`<div style="margin-bottom:10px;font-size:13px;color:#64748b">
    Tổng: <strong>${data.length}</strong> dòng — Tổng qty: <strong>${fmt(total)}</strong>
  </div>
  <table><thead><tr><th>EX_CODE</th><th>Tên SP (POS)</th><th style="text-align:right">Qty bán</th><th>Ghi chú</th></tr></thead>
  <tbody>${data.map(r=>`<tr>
    <td><code>${r.exCode??'?'}</code></td>
    <td>${r.productName??'—'}</td>
    <td style="text-align:right;font-weight:600">${fmt(r.qtySold)}</td>
    <td style="font-size:12px;color:#64748b">${r.note??'—'}</td>
  </tr>`).join('')}</tbody></table>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
nav('items-list');
</script>
</body>
