version: '3.9'

# =====================================================
#  BAKERY MANAGEMENT — Docker Compose
#  Services:
#    postgres  : PostgreSQL 16
#    pgadmin   : pgAdmin 4 (DB GUI)
# =====================================================

services:

  # ---------------------------------------------------
  #  PostgreSQL 16
  # ---------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bakery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakery_db
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d   # chạy lần đầu khi tạo DB
    networks:
      - bakery-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery -d bakery_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------
  #  pgAdmin 4 — Web UI quản lý PostgreSQL
  #  Truy cập: http://localhost:5050
  #  Login: admin@bakery.com / admin123
  # ---------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bakery-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bakery.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - bakery-network
    depends_on:
      postgres:
        condition: service_healthy

# =====================================================
#  VOLUMES
# =====================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# =====================================================
#  NETWORKS
# =====================================================
networks:
  bakery-network:
    driver: bridge
