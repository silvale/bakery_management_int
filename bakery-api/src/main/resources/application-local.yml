logging:
  level:
    com.bakery.api: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bakery_db
    username: bakery
    password: bakery123
    hikari:
      pool-name: Hikari-Bakery-Local
      maximum-pool-size: 20
      minimum-idle: 2

bakery:
  security:
    jwt:
      disable-auth: true
#      secret-key: local-dev-secret-key-minimum-32-chars!!
