---
# Disable springdoc unless api-docs profile is active
spring:
  config:
    activate:
      on-profile: '!api-docs'
springdoc:
  api-docs:
    enabled: false
---

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json
    min-response-size: 1024

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.bakery.api: ${LOG_LEVEL_APP:INFO}

spring:
  application:
    name: bakery-api
  profiles:
    active: dev
    group:
      dev: dev, local, api-docs
      prod: prod
  main:
    keep-alive: true
    allow-bean-definition-overriding: false
    lazy-initialization: false
  web:
    resources:
      add-mappings: false
  mvc:
    log-resolved-exception: false
  threads:
    virtual:
      enabled: true
  jmx:
    enabled: false

  # Database
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bakery}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      pool-name: bakery-pool
      auto-commit: false
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 5000
      data-source-properties:
        ApplicationName: ${spring.application.name}
        reWriteBatchedInserts: true

  # JPA
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jakarta.persistence.schema-generation.database.action: none
        jdbc.batch_size: ${DB_BATCH_SIZE:25}
        order_inserts: true
        order_updates: true

  # JPA repositories bootstrap
  data:
    jpa:
      repositories:
        bootstrap-mode: deferred

  # Disable SQL init
  sql:
    init:
      mode: never

  # Flyway DB migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Admin base (LaaS Starters)
admin:
  code-value:
    enabled: true
  cache:
    enabled: true

# Bakery custom config
bakery:
  security:
    jwt:
      disable-auth: true
      secret-key: ${JWT_SECRET_KEY:changeme-please-use-a-32-char-min-key}
      access-token-expire-ms: ${JWT_ACCESS_EXPIRE_MS:3600000}
      refresh-token-expire-ms: ${JWT_REFRESH_EXPIRE_MS:604800000}
